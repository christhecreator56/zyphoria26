<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Zyphoria 2026 — An ethereal starry night experience. Explore the cosmos with swirling beauty inspired by Van Gogh's masterpiece." />
    <script type="text/javascript">
      // handle redirection from 404.html
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).filter(function(v) {
            return v.slice(0, 2) === 'p='
          })[0];
          if (decoded !== undefined) {
             window.history.replaceState(null, null,
               l.pathname.replace(/\/$/, '') + (decoded ? decoded.slice(2) : '') +
               l.hash
             );
          }
        }
      }(window.location))
    </script>
    <title>Zyphoria 2026 — A Night to Remember</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
